<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coleção de Caricas</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>

header{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(18,18,18,0.98);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 1000;
    padding: 15px 20px;
    min-height: 110px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

* {
    box-sizing: border-box;
}

body{
    margin: 0;
    padding: 200px 20px 70px 20px;
    font-family: Arial, sans-serif;
    background: #121212a2;
    color: rgba(255, 255, 255, 0.623);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 2.4rem;
    font-weight: bold;
    color: #FCAF45;
    text-shadow: 0 0 10px rgba(252, 175, 69, 0.4);
}

#contador{
    color: #b6d7eca9;
    font-weight: bold;
    margin: 0;
}

#pesquisa{
    width: 120px;
    padding: 8px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

@media (max-width: 768px) {

    header{
        padding: 8px 10px;
        min-height: 80px;
    }

    body{
        padding: 110px 5px 60px 5px;
    }

    h1{
        font-size: 1.5rem;
        margin-bottom: 5px;
    }

    .topo-info{
        margin-bottom: 8px;
        gap: 8px;
    }

    .galeria{
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
    }

    .carica{
        padding: 5px;
    }

    .carica img{
        width: 100%;
        max-width: none;
    }

    .numero{
        font-size: 14px;
    }

    .instagram-float,
    .sobre-float{
        width: 42px;
        height: 42px;
        top: 18px;
    }

    .instagram-float svg{
        width: 22px;
        height: 22px;
    }

    .sobre-float{
        font-size: 10px;
    }
}

.carica {
    background: #1e1e1e;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.2s;
}

.carica:hover {
    transform: translateY(-3px);
}

.carica {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.carica img {
    width: 100%;
    max-width: 180px;
    aspect-ratio: 1 / 1;
    height: auto;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #555;
    box-shadow: 0 0 15px rgba(255,255,255,0.15);
}

.numero {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
}

.instagram-float {
    position: absolute;
    top: 35px;
    right: 25px;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: linear-gradient(
        45deg,
        #833AB4,
        #C13584,
        #E1306C,
        #FD1D1D,
        #FCAF45
    );
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 10000;
    transition: transform 0.3s ease;
}

.instagram-float:hover {
    transform: scale(1.12);
}

.instagram-float svg {
    width: 34px;
    height: 34px;
}

footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:50px;

    background:rgba(0,0,0,0.85); /* mais escuro */

    backdrop-filter:blur(10px);
    color:#ffffff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:0.9rem;

    border-top:1px solid rgba(255,255,255,0.15);

    z-index:1000;
}

.topo-info{
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

@media (max-width: 768px) {

    .carica {
        padding: 6px;
    }

    body {
        padding: 120px 5px 70px 5px;
    }
}

.sobre-float {
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.5px;
    position: absolute;
    top: 35px;
    left: 25px;

    width: 65px;
    height: 65px;
    border-radius: 50%;

    background: linear-gradient(
        45deg,
        #833AB4,
        #C13584,
        #E1306C,
        #FD1D1D,
        #FCAF45
    );

    display: flex;
    align-items: center;
    justify-content: center;

    color: white;
    text-decoration: none;
   
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 10000;

    transition: transform 0.3s ease;
}

.sobre-float:hover {
    transform: scale(1.12);
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:20000;

    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#1e1e1e;
    color:white;

    width:90%;
    max-width:450px;

    padding:30px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 0 30px rgba(252,175,69,0.3);

    position:relative;
}

.modal-content h2{
    color:#FCAF45;
    margin-top:0;
}

.modal-content a{
    color:#FCAF45;
    text-decoration:none;
}

.modal-content a:hover{
    text-decoration:underline;
}

.fechar-modal{
    position:absolute;
    top:10px;
    right:15px;

    font-size:30px;
    cursor:pointer;

    color:#FCAF45;
}

</style>
</head>

<!-- Modal Sobre -->

<div id="modalSobre" class="modal">
    <div class="modal-content">

        <span class="fechar-modal">&times;</span>

        <h2>🍺 Caricas_Metalicas</h2>

        <p>
            Coleção catalogada por número.
        </p>

        <p>
            📍 From: Portugal 🇵🇹
        </p>

        <p>
            <strong>Total:</strong>
            <span id="totalModal">0</span> caricas
        </p>

        <p>
            <strong>Instagram:</strong><br>
            <a href="https://www.instagram.com/caricas_metalicas/"
               target="_blank">
               @caricas_metalicas
            </a>
        </p>

        <p>
            🫶 Aceito ofertas.
        </p>

        <p>
            Última atualização: 10.06.2026
        </p>

    </div>
</div>

<body>

<header>
    <h1>🍺 Caricas_Metalicas</h1>

 <div class="topo-info">
    <div id="contador">0 caricas catalogadas</div>

    <input
        type="text"
        id="pesquisa"
        placeholder="🔍 Nº da carica">
</div>

<a href="#"
   id="abrirSobre"
   class="sobre-float"
   aria-label="Sobre">
    Sobre
</a>

<a href="https://www.instagram.com/caricas_metalicas/"
   target="_blank"
   class="instagram-float"
   aria-label="Instagram">

    <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5Zm8.88 1.13a1.12 1.12 0 1 1 0 2.24 1.12 1.12 0 0 1 0-2.24ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.5A3.5 3.5 0 1 0 12 15.5 3.5 3.5 0 0 0 12 8.5Z"/>
    </svg>

</a>

</header>

<div class="galeria" id="galeria"></div>

<div id="lightbox">
    <img id="lightbox-img">
</div>

<!-- Rodapé -->

<footer>
    © 2026 Caricas Metálicas | Atualizado a 10.06.2026
</footer>

<script>

const galeria = document.getElementById("galeria");
const contador = document.getElementById("contador");

const caricas = [];

function atualizarGaleria() {

    caricas.sort((a, b) => Number(a) - Number(b));

    galeria.innerHTML = "";

    caricas.forEach(numero => {

        const card = document.createElement("div");
        card.className = "carica";
        card.dataset.numero = numero;

        card.innerHTML = `
            <img src="caricas/${obterPasta(numero)}/${numero}.jpg" alt="${numero}">
            <div class="numero">Nº ${numero}</div>
        `;

        card.querySelector("img").addEventListener("click", () => {

            document.getElementById("lightbox-img").src =
                `caricas/${obterPasta(numero)}/${numero}.jpg`;

            document.getElementById("lightbox").style.display =
                "flex";
        });

        galeria.appendChild(card);
    });

    contador.textContent =
        `${caricas.length} caricas na coleção`;
}

document.getElementById("lightbox")
.addEventListener("click", () => {
    document.getElementById("lightbox").style.display = "none";
});

document.getElementById("pesquisa")
.addEventListener("input", function() {

    const texto = this.value.toLowerCase();

    document.querySelectorAll(".carica").forEach(card => {

        card.style.display =
            card.dataset.numero.includes(texto)
            ? ""
            : "none";
    });
});

const TAMANHO_PASTA = 50;

function obterPasta(numero) {

    const n = parseInt(numero);

    const inicio =
        Math.floor((n - 1) / TAMANHO_PASTA) * TAMANHO_PASTA + 1;

    const fim =
        inicio + TAMANHO_PASTA - 1;

    return `${String(inicio).padStart(4, "0")}-${String(fim).padStart(4, "0")}`;
}

fetch("caricas.json")
    .then(response => response.json())
    .then(lista => {

        caricas.push(...lista);

        atualizarGaleria();
    })
    .catch(error => {
        console.error("Erro ao carregar caricas.json:", error);
    });

const modalSobre =
    document.getElementById("modalSobre");

const abrirSobre =
    document.getElementById("abrirSobre");

const fecharModal =
    document.querySelector(".fechar-modal");

abrirSobre.addEventListener("click", (e) => {

    e.preventDefault();

    document.getElementById("totalModal")
        .textContent = caricas.length;

    modalSobre.style.display = "flex";
});

fecharModal.addEventListener("click", () => {

    modalSobre.style.display = "none";
});

modalSobre.addEventListener("click", (e) => {

    if (e.target === modalSobre) {
        modalSobre.style.display = "none";
    }
});

</script>

</body>
</html>
