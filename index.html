<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coleção de Caricas</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #121212a2;
    color: white;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

#contador {
    text-align: center;
    color: #aaa;
    margin-bottom: 20px;
}

#pesquisa {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 0 auto 25px auto;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.carica {
    background: #1e1e1e;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.2s;
}

.carica:hover {
    transform: translateY(-3px);
}

.carica img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #555;
    box-shadow: 0 0 15px rgba(255,255,255,0.15);
}

.numero {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
}

.instagram-float {
    position: fixed;
    top: 25px;
    right: 25px;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: linear-gradient(
        45deg,
        #833AB4,
        #C13584,
        #E1306C,
        #FD1D1D,
        #FCAF45
    );
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 10000;
    transition: transform 0.3s ease;
}

.instagram-float:hover {
    transform: scale(1.12);
}

.instagram-float svg {
    width: 34px;
    height: 34px;
}

</style>
</head>

<body>

<header>
    <h1>🍺 Coleção de Caricas</h1>

<div id="contador">0 caricas catalogadas</div>

    <input
        type="text"
        id="pesquisa"
        placeholder="🔍 Procurar número da carica...">


<a href="https://www.instagram.com/caricas_metalicas/"
   target="_blank"
   class="instagram-float"
   aria-label="Instagram">

    <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5Zm8.88 1.13a1.12 1.12 0 1 1 0 2.24 1.12 1.12 0 0 1 0-2.24ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.5A3.5 3.5 0 1 0 12 15.5 3.5 3.5 0 0 0 12 8.5Z"/>
    </svg>

</a>

</header>

<div class="galeria" id="galeria"></div>

<div id="lightbox">
    <img id="lightbox-img">
</div>

<script>

const totalCaricas = 5000;

const galeria = document.getElementById("galeria");
const contador = document.getElementById("contador");

const caricas = [];

function atualizarGaleria() {

    caricas.sort();

    galeria.innerHTML = "";

    caricas.forEach(numero => {

        const card = document.createElement("div");
        card.className = "carica";
        card.dataset.numero = numero;

        card.innerHTML = `
            <img src="caricas/${obterPasta(numero)}/${numero}.jpg" alt="${numero}">
            <div class="numero">#${numero}</div>
        `;

        card.querySelector("img").addEventListener("click", () => {

            document.getElementById("lightbox-img").src =
                `caricas/${obterPasta(numero)}/${numero}.jpg`;

            document.getElementById("lightbox").style.display =
                "flex";
        });

        galeria.appendChild(card);
    });

    contador.textContent =
        `${caricas.length} caricas na coleção`;
}

document.getElementById("lightbox")
.addEventListener("click", () => {
    document.getElementById("lightbox").style.display = "none";
});

document.getElementById("pesquisa")
.addEventListener("input", function() {

    const texto = this.value.toLowerCase();

    document.querySelectorAll(".carica").forEach(card => {

        card.style.display =
            card.dataset.numero.includes(texto)
            ? ""
            : "none";
    });
});

function obterPasta(numero) {

    const n = parseInt(numero);

    const inicio = Math.floor((n - 1) / 100) * 100 + 1;
    const fim = inicio + 99;

    return `${String(inicio).padStart(4, "0")}-${String(fim).padStart(4, "0")}`;
}

let carregadas = 0;

for (let i = 1; i <= totalCaricas; i++) {

    const numero = String(i).padStart(4, "0");

    const img = new Image();
    img.src = `caricas/${obterPasta(numero)}/${numero}.jpg`;

    img.onload = () => {
        caricas.push(numero);

        carregadas++;

        if (carregadas === totalCaricas) {
            atualizarGaleria();
        }
    };

    img.onerror = () => {
        carregadas++;

        if (carregadas === totalCaricas) {
            atualizarGaleria();
        }
    };
}

</script>

</body>
</html>
